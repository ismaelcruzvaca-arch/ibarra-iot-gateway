services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nhost
      POSTGRES_PASSWORD: nhost
      POSTGRES_DB: nhost
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - nhost-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.44.0
    ports:
      - "1337:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://nhost:nhost@postgres:5432/nhost
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: nhost-admin
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nhost-net
    restart: unless-stopped

volumes:
  pg_data:

networks:
  nhost-net:
    driver: bridge
