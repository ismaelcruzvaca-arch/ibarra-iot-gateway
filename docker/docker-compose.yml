# ============================================================================
# Docker Compose — Local Development Stack
# ============================================================================
# Services:
#   mosquitto   — MQTT broker for Modbus telemetry (local dev)
#
# Usage:
#   docker-compose up -d
# ============================================================================

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ibarra-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
