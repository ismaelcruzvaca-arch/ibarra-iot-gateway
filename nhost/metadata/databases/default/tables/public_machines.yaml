table:
  schema: public
  name: machines
select_permissions:
  - role: supervisor
    permission:
      filter:
        line:
          plant_id:
            _eq: x-hasura-plant-id
      columns:
        - id
        - line_id
        - name
        - machine_type
        - metadata
        - created_at
        - updated_at
      allow_aggregations: true
  - role: maintenance
    permission:
      filter:
        line:
          plant_id:
            _eq: x-hasura-plant-id
      columns:
        - id
        - line_id
        - name
        - machine_type
        - metadata
        - created_at
        - updated_at
      allow_aggregations: true
  - role: admin
    permission:
      filter: {}
      columns:
        - id
        - line_id
        - name
        - machine_type
        - metadata
        - created_at
        - updated_at
      allow_aggregations: true
insert_permissions:
  - role: supervisor
    permission:
      columns:
