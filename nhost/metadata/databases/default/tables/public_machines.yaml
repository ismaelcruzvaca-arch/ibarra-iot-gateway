    permission:
      columns:
        - name
        - machine_type
        - metadata
      filter:
        line:
          plant_id:
            _eq: x-hasura-plant-id
      check:
        line:
          plant_id:
            _eq: x-hasura-plant-id
  - role: admin
    permission:
      columns:
        - name
        - machine_type
        - metadata
        - line_id
      filter: {}
