table:
  schema: public
  name: nodes
select_permissions:
  - role: supervisor
    permission:
      filter:
        machine:
          line:
            plant_id:
              _eq: x-hasura-plant-id
      columns:
        - id
        - machine_id
        - device_model_id
        - node_ident
        - metadata
        - created_at
      allow_aggregations: true
