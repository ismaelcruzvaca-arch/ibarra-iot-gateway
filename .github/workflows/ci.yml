# ============================================================================
# CI/CD Pipeline — GEMA Vision for Rockchip RV1106
#
# Dual-compilation strategy:
#   build_test   → armhf + QEMU_TEST_MODE=ON  → run SIL tests under QEMU
#   build_prod   → armhf + QEMU_TEST_MODE=OFF → production binary (not run)
#
# QEMU user-mode emulation translates armhf syscalls to x86_64 so that
# SIL tests (MockEngine, MockVideoProducer, MockOcrEngine) can validate
# logic, memory, concurrency, and OTA state machines without physical
# Rockchip hardware (NPU, RGA, camera).
#
# Triggers:
#   - push to main, feature/gema-vision, feature/gema-v3
#   - pull_request targeting those branches
#   - workflow_dispatch (manual trigger for OTA release builds)
# ============================================================================

name: gema-vision CI

on:
  push:
    branches: [main, feature/gema-vision, feature/gema-v3]
  pull_request:
    branches: [main, feature/gema-vision]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: false
        type: string

env:
  DOCKER_BUILD_IMAGE: gema-builder
  BUILD_CONTEXT: edge_ops/gema_vision

jobs:
  # ==========================================================================
  # Job 1: Cross-compile + SIL tests under QEMU
  # ==========================================================================
  test:
    name: Build & Test (armhf + QEMU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Register QEMU binfmt_misc for ARM user-mode
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        # --reset removes stale entries, -p yes makes them persistent

      - name: Build cross-compilation Docker image
        run: |
          docker build \
            -f ${{ env.BUILD_CONTEXT }}/Dockerfile.build \
            -t ${{ env.DOCKER_BUILD_IMAGE }} \
            --target gtest-builder \
            ${{ env.BUILD_CONTEXT }}
        # --target gtest-builder = only build up to GTest compilation
        # (faster cache layer; full image built in next step)

      - name: Cross-compile SIL test binaries (armhf + QEMU_TEST_MODE)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "cd /workspace/edge_ops/gema_vision && \
              cmake -B build_test \
                -DCMAKE_TOOLCHAIN_FILE=toolchain-arm-rockchip.cmake \
                -DQEMU_TEST_MODE=ON \
                -DUSE_MOCK_PRODUCER=ON \
                -DGTEST_ROOT=/opt/arm-gtest \
                -DCMAKE_BUILD_TYPE=Debug && \
              cmake --build build_test -j\$(nproc)"

      - name: Run SIL tests under QEMU user-mode emulation
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "cd /workspace/edge_ops/gema_vision && \
              ctest --test-dir build_test --output-on-failure -j\$(nproc)"
        # Each test binary is armhf ELF → QEMU translates to x86_64
        # Mocks guarantee no NPU/RGA/camera syscalls → no segfaults

      - name: Cross-compile production binaries (armhf, no QEMU mode)
        if: github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "cd /workspace/edge_ops/gema_vision && \
              cmake -B build_prod \
                -DCMAKE_TOOLCHAIN_FILE=toolchain-arm-rockchip.cmake \
                -DQEMU_TEST_MODE=OFF \
                -DUSE_MOCK_PRODUCER=OFF \
                -DGTEST_ROOT=/opt/arm-gtest \
                -DCMAKE_BUILD_TYPE=MinSizeRel && \
              cmake --build build_prod -j\$(nproc)"

      - name: Archive production binaries (artifacts)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gema-production-armhf
          path: |
            ${{ env.BUILD_CONTEXT }}/build_prod/gema-vision
            ${{ env.BUILD_CONTEXT }}/build_prod/gema-ota
          retention-days: 30

  # ==========================================================================
  # Job 2: OTA package + GitHub Release (manual trigger only)
  # ==========================================================================
  release:
    name: Package OTA Release
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download production binaries
        uses: actions/download-artifact@v4
        with:
          name: gema-production-armhf
          path: build_prod

      - name: Make binaries executable
        run: chmod +x build_prod/gema-vision build_prod/gema-ota

      - name: Generate Ed25519 key pair (if not exists)
        run: |
          if [ ! -f keys/ota-private-key.pem ]; then
            mkdir -p keys
            openssl genpkey -algorithm ed25519 -out keys/ota-private-key.pem
            openssl pkey -in keys/ota-private-key.pem -pubout \
              -out keys/ota-public-key.pem
          fi

      - name: Package OTA artifact
        run: |
          VERSION="${{ github.event.inputs.version || '0.0.0' }}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p ota_output

          # Package gema-vision binary → OTA artifact with manifest
          cp build_prod/gema-vision ota_output/gema-vision.bin
          cp edge_ops/gema_vision/deploy/gema-vision.service ota_output/
          cp edge_ops/gema_vision/deploy/gema-ota.service ota_output/
          cp build_prod/gema-ota ota_output/gema-ota.bin

          # Generate SHA-256 manifest
          cd ota_output
          sha256sum gema-vision.bin gema-ota.bin > manifest.sha256

          # Sign manifest with Ed25519
          openssl dgst -ed25519 \
            -sign "${{ github.workspace }}/keys/ota-private-key.pem" \
            -out manifest.sig manifest.sha256

          # Create version metadata
          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "build_timestamp": "$TIMESTAMP",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.run_id }}"
          }
          EOF

          # Create final OTA tarball
          tar czf ../gema-vision-${VERSION}.ota \
            gema-vision.bin gema-ota.bin \
            gema-vision.service gema-ota.service \
            manifest.sha256 manifest.sig version.json

          cd ..
          echo "OTA_ARTIFACT=gema-vision-${VERSION}.ota" >> $GITHUB_ENV

      - name: Generate built-in key header for future builds
        run: |
          xxd -i keys/ota-public-key.pem \
            > edge_ops/gema_vision/include/ota_builtin_key.h
          echo "ota_builtin_key.h regenerated from current public key"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || github.run_number }}
          name: "GEMA Vision v${{ github.event.inputs.version || github.run_number }}"
          body: |
            ## OTA Release
            
            - Commit: ${{ github.sha }}
            - Binaries compiled for Rockchip RV1106 (armhf, uClibc)
            - SIL tests: ${{ needs.test.result }}
            
            ### Artifacts
            - `gema-vision.bin` — Vision inference daemon
            - `gema-ota.bin` — OTA update agent
            - `manifest.sha256` — Checksums
            - `manifest.sig` — Ed25519 signature
            
            ### Deploy
            Upload the `.ota` tarball to your OTA server and publish an MQTT
            command on `novamex/vision/ota/update`.
          files: |
            ${{ env.OTA_ARTIFACT }}
          fail_on_unmatched_files: true
