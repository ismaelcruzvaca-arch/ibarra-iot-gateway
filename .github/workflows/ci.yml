# ============================================================================
# CI/CD Pipeline — GEMA Vision for Rockchip RV1106
#
# Strategy:
#   Tests run NATIVE x86_64 with QEMU_TEST_MODE=ON (all hardware mocked).
#   No QEMU, no cross-compilation needed for CI — the mocks make the
#   pipeline fully testable on any platform.
#
#   Production ARM cross-compilation runs only on workflow_dispatch
#   (manual trigger for OTA release).  Needs the Rockchip SDK toolchain,
#   currently uses arm-linux-gnueabihf as fallback.
#
# Triggers:
#   - push to main, feature/gema-vision, feature/gema-v3 → run tests
#   - pull_request → run tests
#   - workflow_dispatch → full production build + OTA release
# ============================================================================

name: gema-vision CI

on:
  push:
    branches: [main, feature/gema-vision, feature/gema-v3]
  pull_request:
    branches: [main, feature/gema-vision]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: false
        type: string

env:
  DOCKER_BUILD_IMAGE: gema-builder

jobs:
  # ==========================================================================
  # Job 1: Build + test (native x86_64, all hardware mocked)
  # ==========================================================================
  test:
    name: Build & Test (native x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: |
          docker build \
            -f edge_ops/gema_vision/Dockerfile.build \
            -t ${{ env.DOCKER_BUILD_IMAGE }} \
            .

      - name: Cross-compile test binaries (native x86_64, QEMU_TEST_MODE)
        run: |
          docker run --rm ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "cmake -B build_test \
              -DQEMU_TEST_MODE=ON \
              -DUSE_MOCK_PRODUCER=ON \
              -DCMAKE_BUILD_TYPE=Debug \
              -S /workspace/edge_ops/gema_vision && \
            cmake --build build_test -j\$(nproc)"

      - name: Run SIL tests
        run: |
          docker run --rm ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "ctest --test-dir build_test --output-on-failure -j\$(nproc)"

      - name: Cross-compile production ARM binary (if toolchain available)
        if: github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm ${{ env.DOCKER_BUILD_IMAGE }} \
            sh -c "cmake -B build_prod \
              -DQEMU_TEST_MODE=OFF \
              -DUSE_MOCK_PRODUCER=OFF \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -S /workspace/edge_ops/gema_vision && \
            cmake --build build_prod -j\$(nproc) || \
            echo 'Production build skipped (no ARM toolchain)'"

      - name: Archive production binaries
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gema-production-armhf
          path: |
            build_prod/gema-vision
            build_prod/gema-ota
          retention-days: 30

  # ==========================================================================
  # Job 2: OTA package + GitHub Release (manual trigger only)
  # ==========================================================================
  release:
    name: Package OTA Release
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download production binaries
        uses: actions/download-artifact@v4
        with:
          name: gema-production-armhf
          path: build_prod

      - name: Make binaries executable
        run: chmod +x build_prod/gema-vision build_prod/gema-ota

      - name: Generate Ed25519 key pair
        run: |
          if [ ! -f keys/ota-private-key.pem ]; then
            mkdir -p keys
            openssl genpkey -algorithm ed25519 -out keys/ota-private-key.pem
            openssl pkey -in keys/ota-private-key.pem -pubout \
              -out keys/ota-public-key.pem
          fi

      - name: Package OTA artifact
        run: |
          VERSION="${{ github.event.inputs.version || '0.0.0' }}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p ota_output

          cp build_prod/gema-vision ota_output/gema-vision.bin
          cp edge_ops/gema_vision/deploy/gema-vision.service ota_output/
          cp edge_ops/gema_vision/deploy/gema-ota.service ota_output/
          cp build_prod/gema-ota ota_output/gema-ota.bin

          cd ota_output
          sha256sum gema-vision.bin gema-ota.bin > manifest.sha256

          openssl dgst -ed25519 \
            -sign "${{ github.workspace }}/keys/ota-private-key.pem" \
            -out manifest.sig manifest.sha256

          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "build_timestamp": "$TIMESTAMP",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.run_id }}"
          }
          EOF

          tar czf ../gema-vision-${VERSION}.ota \
            gema-vision.bin gema-ota.bin \
            gema-vision.service gema-ota.service \
            manifest.sha256 manifest.sig version.json

          cd ..
          echo "OTA_ARTIFACT=gema-vision-${VERSION}.ota" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || github.run_number }}
          name: "GEMA Vision v${{ github.event.inputs.version || github.run_number }}"
          body: |
            ## OTA Release

            - Commit: ${{ github.sha }}
            - SIL tests: ${{ needs.test.result }}
            - Binaries: gema-vision + gema-ota
          files: |
            ${{ env.OTA_ARTIFACT }}
          fail_on_unmatched_files: true
