syntax = "proto3";

package ibarra.telemetry;

// Operating status of a Modbus edge node.
enum OperatingStatus {
  STATUS_UNKNOWN   = 0;
  STATUS_RUNNING   = 1;
  STATUS_STOPPED   = 2;
  STATUS_ALARM     = 3;
  STATUS_MAINTENANCE = 4;
}

// State snapshot for a single Modbus edge node.
message ModbusNodeState {
  string          node_id     = 1;
  uint32          cycle_count = 2;
  OperatingStatus status      = 3;
}

// Payload sent from the Modbus bridge containing multiple node states.
message ModbusBridgePayload {
  repeated ModbusNodeState nodes = 1;
}

// Hardware health metrics from the RV1106 gateway itself.
message HardwareHealthPayload {
  float  cpu_temperature = 1;
  uint64 ram_used_bytes   = 2;
  float  system_load      = 3;
}
