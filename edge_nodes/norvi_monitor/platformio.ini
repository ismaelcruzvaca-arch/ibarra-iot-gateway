[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DINPUT_PIN=18
    -I.
board_build.filesystem = littlefs

lib_deps =
    adafruit/Adafruit ADS1X15
    adafruit/Adafruit BusIO
    Wire
    SPI
    knolleary/PubSubClient
    bblanchon/ArduinoJson

